// 图片压缩
function compressImage(src,callback){
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement("canvas");
    var max=700;
    var w=img.width;
    var h=img.height;
    if(w>h){ if(w>max){ h=h*(max/w); w=max; } }
    else{ if(h>max){ w=w*(max/h); h=max; } }
    canvas.width=w;
    canvas.height=h;
    var ctx=canvas.getContext("2d");
    ctx.drawImage(img,0,0,w,h);
    callback(canvas.toDataURL("image/jpeg",0.75));
  };
  img.src=src;
}


// 添加 Marker
function addMarker(photo){
  var angle = (Math.random()*12-6);
  var icon = L.divIcon({
    html:`<div class="photo-container" style="--rot:${angle}deg"><img class="photo" src="${photo.img}"></div>`,
    className:"",
    iconSize:[120,120]
  });
  var marker = L.marker([photo.lat,photo.lng],{icon}).addTo(map);

  // 点击删除
  var popup = document.createElement("div");
popup.innerHTML = `
<img src="${photo.img}" width="240"><br>
<b>${photo.date}</b><br>
${photo.diary}
`;
marker.bindPopup(popup);

  // 新图片加入时同步缩放
  updatePhotoSize();
}

// 缩放只作用于图片
function updatePhotoSize(){
  var zoom = map.getZoom();
  var baseZoom = 16;
  var scale = Math.pow(2, zoom - baseZoom) * 0.45;
  var size = Math.max(50, Math.min(150, 120*scale));
  document.querySelectorAll(".photo").forEach(el=>{
    el.style.width = size + "px";
  });
}

map.on("zoom", updatePhotoSize);
